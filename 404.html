<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — Sayfa bulunamadı | Ahmet Hamdi Kilic</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <main id="main">
      <section class="hero" style="min-height: 100vh; align-items: center; justify-content: center; text-align: center;">
        <div class="container" style="text-align: center;">
          <p class="eyebrow" style="display: inline-flex;">Error · /404</p>
          <h1 style="margin: 12px auto 20px;">404 — <em>Not&nbsp;found.</em></h1>
          <p class="lead" style="margin: 0 auto 32px; max-width: 50ch;">Bu URL ya da kaynak burada yok. Liquid template gibi düşün — bu route bulunamadı. Anasayfaya geri dönelim.</p>

          <div class="ascii-panel" aria-hidden="true" style="max-width: 540px; margin: 0 auto 40px; text-align: left;">
            <div class="ascii-head">
              <span>error.log</span>
              <span class="dots"><span></span><span></span><span></span></span>
            </div>
            <div class="terminal-line"><span class="prompt">$</span> get /unknown</div>
            <div class="terminal-line">→ <span style="color:var(--lime)">404</span> · template not found</div>
            <div class="terminal-line"><span class="prompt">$</span> redirect <span class="cursor"></span></div>
          </div>

          <div class="hero-actions" style="justify-content: center;">
            <a class="button button-primary" href="/">Anasayfa ↗</a>
            <a class="button button-secondary" href="/work.html">Projeleri gör</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
